<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weber — Build anything, visually.</title>
    <meta name="description" content="Weber is the no-code builder that lets you describe what you need and generates it instantly. Start building for free." />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js"></script>

    <style>
      /* ─── Reset ─── */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        border: 0 solid;
      }
      a { color: inherit; text-decoration: none; }
      button, input, textarea { font: inherit; color: inherit; background: transparent; border-radius: 0; }
      img, svg, video { display: block; max-width: 100%; }
      ul, ol { list-style: none; }

      /* ─── Tokens ─── */
      :root {
        --bg:             #ffffff;
        --fg:             #0a0a0a;
        --border:         #e5e5e5;
        --muted:          #737373;
        --surface:        #f5f5f5;
        --blue:           #007aff;   /* Used ONLY on the Generate button */
        --blue-hover:     #0070eb;
        --radius-sm:      6px;
        --radius-md:      10px;
        --radius-lg:      16px;
        --radius-full:    9999px;
        --font:           'Geist', system-ui, sans-serif;
        --transition:     150ms cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* ─── Base ─── */
      html { line-height: 1.5; -webkit-text-size-adjust: 100%; }
      body {
        font-family: var(--font);
        background-color: var(--bg);
        color: var(--fg);
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
      }

      /* ─── NAV ─── */
      header {
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        border-bottom: 1px solid var(--border);
        position: sticky;
        top: 0;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        z-index: 50;
      }

      .nav-logo {
        font-size: 17px;
        font-weight: 700;
        letter-spacing: -0.03em;
        color: var(--fg);
      }

      nav {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      nav a {
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        transition: color var(--transition);
      }
      nav a:hover { color: var(--fg); }

      .nav-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .btn-ghost {
        font-size: 14px;
        font-weight: 500;
        color: var(--muted);
        cursor: pointer;
        transition: color var(--transition);
      }
      .btn-ghost:hover { color: var(--fg); }

      .btn-outline {
        font-size: 13px;
        font-weight: 500;
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 6px 14px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        cursor: pointer;
        transition: background-color var(--transition), border-color var(--transition);
      }
      .btn-outline:hover { background: var(--surface); }

      /* ─── HERO ─── */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 80px 24px 64px;
        text-align: center;
      }

      /* Badge */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border: 1px solid var(--border);
        border-radius: var(--radius-full);
        padding: 5px 14px;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 36px;
        background: var(--bg);
        box-shadow: 0 1px 2px rgba(0,0,0,0.04);
      }
      .badge iconify-icon { font-size: 14px; }

      /* Headline */
      h1 {
        font-size: clamp(40px, 6vw, 64px);
        font-weight: 800;
        letter-spacing: -0.04em;
        line-height: 1.05;
        color: var(--fg);
        max-width: 700px;
        margin-bottom: 48px;
      }

      /* ─── INPUT CARD ─── */
      .input-card {
        width: 100%;
        max-width: 680px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 0 0 0 transparent;
        display: flex;
        flex-direction: column;
        min-height: 160px;
        text-align: left;
        transition: box-shadow var(--transition), border-color var(--transition);
        position: relative;
      }
      .input-card:focus-within {
        border-color: #d1d1d1;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      }

      .input-card textarea {
        flex: 1;
        resize: none;
        padding: 18px 18px 0;
        font-size: 15px;
        font-weight: 400;
        color: var(--fg);
        background: transparent;
        outline: none;
        min-height: 100px;
        line-height: 1.55;
      }
      .input-card textarea::placeholder {
        color: #b5b5b5;
      }

      .input-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 10px 10px 12px;
      }

      .input-actions {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .input-action-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        cursor: pointer;
        border-radius: var(--radius-sm);
        padding: 5px 8px;
        transition: color var(--transition), background var(--transition);
      }
      .input-action-btn:hover {
        color: var(--fg);
        background: var(--surface);
      }
      .input-action-btn iconify-icon { font-size: 15px; }

      /* ── Generate button — THE ONE place blue appears ── */
      .btn-generate {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: var(--blue);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        border-radius: var(--radius-md);
        padding: 8px 16px;
        height: 38px;
        cursor: pointer;
        transition: background var(--transition), transform 80ms ease;
        box-shadow: 0 1px 3px rgba(0,122,255,0.25);
        flex-shrink: 0;
      }
      .btn-generate:hover { background: var(--blue-hover); }
      .btn-generate:active { transform: scale(0.97); }
      .btn-generate iconify-icon { font-size: 14px; }

      /* ─── QUICK SHORTCUTS ─── */
      .shortcuts {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 36px;
        max-width: 680px;
        width: 100%;
      }

      .shortcut-chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-size: 13px;
        font-weight: 500;
        color: var(--muted);
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius-full);
        padding: 6px 14px;
        cursor: pointer;
        transition: color var(--transition), background var(--transition), border-color var(--transition);
      }
      .shortcut-chip:hover {
        color: var(--fg);
        background: #efefef;
        border-color: #d4d4d4;
      }
      .shortcut-chip iconify-icon { font-size: 14px; }

      /* ─── FOOTER ─── */
      footer {
        padding: 20px 28px;
        border-top: 1px solid var(--border);
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-wrap: wrap;
      }

      .footer-copy {
        font-size: 13px;
        color: var(--muted);
      }

      .footer-links {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .footer-links a {
        font-size: 13px;
        color: var(--muted);
        transition: color var(--transition);
      }
      .footer-links a:hover { color: var(--fg); }

      /* ─── Mobile ─── */
      @media (max-width: 640px) {
        header { padding: 0 16px; }
        nav { display: none; }

        main { padding: 60px 16px 48px; }
        h1 { font-size: 36px; margin-bottom: 36px; }

        footer {
          flex-direction: column;
          align-items: flex-start;
          gap: 10px;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>

    <!-- ═══ NAV ═══ -->
    <header>
      <span class="nav-logo">weber</span>

      <nav>
        <a href="#">Features</a>
        <a href="#">Pricing</a>
        <a href="#">Blog</a>
      </nav>

      <div class="nav-actions">
        <a class="btn-ghost" href="#">Log in</a>
        <button class="btn-outline" id="signup-btn">Sign Up</button>
      </div>
    </header>

    <!-- ═══ HERO ═══ -->
    <main>
      <div class="badge">
        <iconify-icon icon="lucide:gift"></iconify-icon>
        Free credits on signup
      </div>

      <h1>What should we build?</h1>

      <!-- Input card -->
      <div class="input-card" id="main-input-card">
        <textarea
          id="main-input"
          placeholder="Describe what you need..."
          rows="4"
          aria-label="Describe what you want to build"
        ></textarea>

        <div class="input-footer">
          <div class="input-actions">
            <button class="input-action-btn" id="attach-btn" aria-label="Attach file">
              <iconify-icon icon="lucide:paperclip"></iconify-icon>
              Attach
            </button>
            <button class="input-action-btn" id="agent-btn" aria-label="Toggle agent mode">
              <iconify-icon icon="lucide:sliders-horizontal"></iconify-icon>
              Agent Mode
            </button>
          </div>

          <button class="btn-generate" id="generate-btn" aria-label="Generate">
            Generate
            <iconify-icon icon="lucide:arrow-up"></iconify-icon>
          </button>
        </div>
      </div>

      <!-- Quick shortcuts -->
      <div class="shortcuts" role="list">
        <button class="shortcut-chip" role="listitem">
          <iconify-icon icon="lucide:image"></iconify-icon>
          From Image
        </button>
        <button class="shortcut-chip" role="listitem">
          <iconify-icon icon="lucide:figma"></iconify-icon>
          From Figma
        </button>
        <button class="shortcut-chip" role="listitem">
          <iconify-icon icon="lucide:layout-template"></iconify-icon>
          Wireframe
        </button>
        <button class="shortcut-chip" role="listitem">
          <iconify-icon icon="lucide:monitor"></iconify-icon>
          Landing page
        </button>
        <button class="shortcut-chip" role="listitem">
          <iconify-icon icon="lucide:smartphone"></iconify-icon>
          Mobile app
        </button>
      </div>
    </main>

    <!-- ═══ FOOTER ═══ -->
    <footer>
      <p class="footer-copy">© 2025 weber. All rights reserved.</p>

      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
        <a href="#" aria-label="Twitter / X">
          <iconify-icon icon="lucide:twitter" style="font-size:14px; display:block;"></iconify-icon>
        </a>
      </div>
    </footer>

  </body>
</html>
